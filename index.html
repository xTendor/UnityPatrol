<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Interaktive Karte</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #111;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 3
  });

  const imageWidth = 3870;
  const imageHeight = 3279;

  const bounds = [[0, 0], [imageHeight, imageWidth]];

  L.imageOverlay('karte.png', bounds).addTo(map);

  map.fitBounds(bounds);

  L.marker([3000, 2100])
    .addTo(map)
    .bindPopup('Beispiel-Marker');
</script>

</body>
</html>
